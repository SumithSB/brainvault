<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#1c2338"/>
      <stop offset="100%" stop-color="#080c16"/>
    </radialGradient>
    <linearGradient id="brainFill" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#5ba7ff"/>
      <stop offset="100%" stop-color="#9c5ef5"/>
    </linearGradient>
    <linearGradient id="lockFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ab5ff"/>
      <stop offset="100%" stop-color="#b07ef8"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="100" cy="100" r="97" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#28335a" stroke-width="2.5"/>

  <!-- ── BRAIN (top-down, two lobes) ── -->

  <!-- Left lobe -->
  <path d="
    M 100 44
    C  95 44  82 44  73 51
    C  62 59  58 71  57 81
    C  56 89  58 96  54 104
    C  50 112  48 118  53 124
    C  57 130  67 132  76 129
    C  83 126  89 120  93 117
    C  96 119  98 121  100 121
    Z
  " fill="url(#brainFill)"/>

  <!-- Right lobe -->
  <path d="
    M 100 44
    C 105 44 118 44 127 51
    C 138 59 142 71 143 81
    C 144 89 142 96 146 104
    C 150 112 152 118 147 124
    C 143 130 133 132 124 129
    C 117 126 111 120 107 117
    C 104 119 102 121 100 121
    Z
  " fill="url(#brainFill)"/>

  <!-- Longitudinal fissure (centre gap) -->
  <rect x="98" y="44" width="4" height="77" fill="#080c16"/>

  <!-- Sulci — left -->
  <path d="M 77 57 C 73 66 72 75 75 83"
        fill="none" stroke="#080c16" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 64 77 C 67 86 66 95 69 103"
        fill="none" stroke="#080c16" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 58 103 C 61 110 60 118 64 124"
        fill="none" stroke="#080c16" stroke-width="2" stroke-linecap="round"/>

  <!-- Sulci — right -->
  <path d="M 123 57 C 127 66 128 75 125 83"
        fill="none" stroke="#080c16" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 136 77 C 133 86 134 95 131 103"
        fill="none" stroke="#080c16" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 142 103 C 139 110 140 118 136 124"
        fill="none" stroke="#080c16" stroke-width="2" stroke-linecap="round"/>

  <!-- ── LOCK (vault symbol) ── -->

  <!-- Shackle -->
  <path d="M 85 153 L 85 145 C 85 133 115 133 115 145 L 115 153"
        fill="none" stroke="url(#lockFill)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#softglow)"/>

  <!-- Body -->
  <rect x="79" y="153" width="42" height="30" rx="6" fill="url(#lockFill)" filter="url(#softglow)"/>

  <!-- Keyhole -->
  <circle cx="100" cy="165" r="6.5" fill="#080c16"/>
  <rect x="97" y="169" width="6" height="8" rx="2" fill="#080c16"/>
</svg>
